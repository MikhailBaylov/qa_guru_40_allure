plugins {
    id 'java'
    id 'io.qameta.allure' version '4.0.2'
}

group 'ru.aniklab'
version '1.0-SNAPSHOT'

allure {
    report {
        version.set("2.34.0")
    }
    adapter { // отвечает за появление папочки build/allure-results
        aspectjWeaver.set(true) //обработка аннотации @Step
        frameworks {
            junit5 { //название фреймворка
                adapterVersion.set("2.34.0") //версия интеграции фреймворка и Allure
            }
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation(
            'org.junit.jupiter:junit-jupiter:6.0.3',
            'com.codeborne:selenide:7.16.1',
            'io.qameta.allure:allure-selenide:2.34.0'
    )
}

test {
    useJUnitPlatform()
    systemProperties(System.getProperties())
}
